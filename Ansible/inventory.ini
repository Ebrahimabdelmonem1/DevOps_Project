[bastion_hosts]
bastion ansible_host=0.0.0.0 ansible_user=ubuntu ansible_ssh_private_key_file=./my-key.pem

[private]
app ansible_host=0.0.0.0 ansible_user=ubuntu ansible_ssh_private_key_file=./my-key.pem

[private:vars]
ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -i ./my-key ubuntu@0.0.0.0" -o StrictHostKeyChecking=no'
